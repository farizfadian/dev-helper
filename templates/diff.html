{{define "content"}}
<style>
    #diffContainer {
        border: 1px solid var(--bs-border-color);
        border-radius: 4px;
        overflow: hidden;
    }
    .file-drop {
        border: 2px dashed var(--bs-border-color);
        border-radius: 6px;
        padding: 0.75rem;
        text-align: center;
        cursor: pointer;
        color: var(--bs-secondary-color);
        font-size: 0.85rem;
        transition: all 0.15s ease;
    }
    .file-drop:hover {
        border-color: #0d6efd;
        color: #0d6efd;
    }
    .status-bar {
        font-size: 0.8rem;
        color: var(--bs-secondary-color);
        padding: 2px 8px;
        background: var(--bs-tertiary-bg);
        border: 1px solid var(--bs-border-color);
        border-top: none;
        border-radius: 0 0 4px 4px;
    }
</style>

<!-- Focus wrapper -->
<div id="focusWrapper" class="focus-wrapper">

<!-- Toolbar -->
<div class="d-flex justify-content-between align-items-center mb-3 focus-toolbar">
    <h5 class="mb-0"><i class="bi bi-file-diff"></i> Code Comparison <i id="pinToggle" data-tool="diff" class="bi bi-star pin-star" onclick="togglePin('diff')"></i></h5>
    <div class="d-flex align-items-center gap-2 flex-wrap">
        <select id="languageSelect" class="form-select form-select-sm focus-hide" style="width: auto; min-width: 120px;">
            <option value="plaintext">Plain Text</option>
            <option value="javascript">JavaScript</option>
            <option value="typescript">TypeScript</option>
            <option value="json">JSON</option>
            <option value="html">HTML</option>
            <option value="css">CSS</option>
            <option value="xml">XML</option>
            <option value="sql">SQL</option>
            <option value="java">Java</option>
            <option value="csharp">C#</option>
            <option value="python">Python</option>
            <option value="go">Go</option>
            <option value="cpp">C++</option>
            <option value="c">C</option>
            <option value="php">PHP</option>
            <option value="ruby">Ruby</option>
            <option value="rust">Rust</option>
            <option value="shell">Shell</option>
            <option value="yaml">YAML</option>
            <option value="markdown">Markdown</option>
        </select>
        <button class="btn btn-sm btn-outline-secondary focus-hide" id="inlineToggle" title="Toggle inline/side-by-side">
            <i class="bi bi-layout-split"></i> Side by Side
        </button>
        <button class="btn btn-sm btn-outline-secondary focus-hide" id="swapBtn" title="Swap original and modified">
            <i class="bi bi-arrow-left-right"></i> Swap
        </button>
        <button class="btn btn-sm btn-outline-secondary focus-hide" id="clearBtn" title="Clear both">
            <i class="bi bi-x-lg"></i> Clear
        </button>
        <button class="btn btn-sm btn-outline-primary" id="focusModeBtn" title="Expand (F11)">
            <i class="bi bi-arrows-fullscreen"></i> Expand
        </button>
    </div>
</div>

<!-- File Upload Row -->
<div class="row g-2 mb-2 focus-hide">
    <div class="col-md-6">
        <div class="file-drop" id="dropOriginal">
            <i class="bi bi-file-earmark-arrow-up"></i> Drop or click to load <strong>Original</strong> file
            <input type="file" id="fileOriginal" class="d-none">
        </div>
    </div>
    <div class="col-md-6">
        <div class="file-drop" id="dropModified">
            <i class="bi bi-file-earmark-arrow-up"></i> Drop or click to load <strong>Modified</strong> file
            <input type="file" id="fileModified" class="d-none">
        </div>
    </div>
</div>

<!-- Diff Editor Container -->
<div class="focus-grow">
    <div id="diffContainer" class="focus-fill" style="height: calc(100vh - 290px); min-height: 400px;"></div>
</div>

<!-- Status Bar -->
<div class="status-bar d-flex justify-content-between">
    <span id="statusLeft">Ready</span>
    <span id="statusRight">Plain Text</span>
</div>

</div><!-- /focus-wrapper -->
{{end}}

{{define "scripts"}}
<script src="/static/monaco-editor/min/vs/loader.js"></script>
<script src="/static/diff.js"></script>
{{end}}
