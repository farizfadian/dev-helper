{{define "content"}}
<style>
    .snippets-layout {
        display: flex;
        height: calc(100vh - 150px);
        border: 1px solid var(--bs-border-color);
        border-radius: 8px;
        overflow: hidden;
    }
    /* ── Left Panel: Snippet List ── */
    .snippets-sidebar {
        width: 300px;
        min-width: 300px;
        border-right: 1px solid var(--bs-border-color);
        display: flex;
        flex-direction: column;
        background: var(--bs-tertiary-bg);
    }
    .snippets-sidebar-header { padding: 10px; border-bottom: 1px solid var(--bs-border-color); }
    .snippets-categories {
        padding: 6px 10px;
        border-bottom: 1px solid var(--bs-border-color);
        display: flex; gap: 4px; flex-wrap: wrap;
    }
    .cat-btn {
        font-size: 0.7rem; padding: 2px 8px; border-radius: 12px;
        border: 1px solid var(--bs-border-color); background: transparent;
        color: var(--bs-body-color); cursor: pointer; white-space: nowrap;
    }
    .cat-btn.active { background: var(--bs-primary); color: #fff; border-color: var(--bs-primary); }
    .cat-btn:hover:not(.active) { background: var(--bs-secondary-bg); }
    .snippets-list { flex: 1; overflow-y: auto; padding: 6px; }
    .snippet-card {
        padding: 10px; margin-bottom: 4px; border-radius: 6px; cursor: pointer;
        border: 2px solid transparent; transition: all 0.1s;
    }
    .snippet-card:hover { background: var(--bs-secondary-bg); }
    .snippet-card.active { border-color: var(--bs-primary); background: var(--bs-secondary-bg); }
    .snippet-card-title { font-weight: 600; font-size: 0.85rem; margin-bottom: 2px; display: flex; align-items: center; gap: 4px; }
    .snippet-card-desc {
        font-size: 0.75rem; color: var(--bs-secondary-color);
        overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    }
    .snippet-card-meta {
        display: flex; align-items: center; gap: 4px; margin-top: 4px;
        font-size: 0.65rem; color: var(--bs-secondary-color);
    }
    .lang-badge {
        font-size: 0.6rem; padding: 1px 6px; border-radius: 4px;
        background: var(--bs-primary-bg-subtle); color: var(--bs-primary);
        font-weight: 600; text-transform: uppercase; flex-shrink: 0;
    }
    /* ── Right Panel: Editor ── */
    .snippets-editor {
        flex: 1; display: flex; flex-direction: column; min-width: 0;
    }
    .snippets-editor-header { padding: 8px 12px; border-bottom: 1px solid var(--bs-border-color); }
    .snippets-title-input {
        border: none; outline: none; background: transparent;
        font-size: 1.2rem; font-weight: 700; width: 100%;
        color: var(--bs-body-color);
    }
    .snippets-title-input::placeholder { color: var(--bs-secondary-color); }
    .snippets-desc-input {
        border: none; outline: none; background: transparent;
        font-size: 0.85rem; width: 100%;
        color: var(--bs-secondary-color);
    }
    .snippets-desc-input::placeholder { color: var(--bs-secondary-color); opacity: 0.6; }
    .snippets-tags-bar {
        padding: 4px 12px; border-bottom: 1px solid var(--bs-border-color);
        display: flex; gap: 4px; flex-wrap: wrap; align-items: center;
    }
    .snippet-tag {
        font-size: 0.7rem; padding: 1px 8px; border-radius: 10px;
        background: var(--bs-primary-bg-subtle); color: var(--bs-primary);
        display: flex; align-items: center; gap: 2px;
    }
    .snippet-tag .remove-tag { cursor: pointer; font-size: 0.6rem; }
    .tag-input {
        border: none; outline: none; background: transparent;
        font-size: 0.75rem; width: 80px; color: var(--bs-body-color);
    }
    .snippets-toolbar {
        padding: 4px 12px; border-bottom: 1px solid var(--bs-border-color);
        display: flex; justify-content: space-between; align-items: center;
    }
    .snippets-body { flex: 1; overflow: hidden; position: relative; }
    .snippets-body #monacoEditor { width: 100%; height: 100%; }
    /* Empty state */
    .snippets-empty {
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        height: 100%; color: var(--bs-secondary-color);
    }
    .snippets-empty > i { font-size: 3rem; }
    /* Save status */
    .save-status { font-size: 0.7rem; color: var(--bs-secondary-color); }
    .save-status.saving { color: var(--bs-warning); }
    .save-status.saved { color: var(--bs-success); }
</style>

<!-- Toolbar -->
<div class="d-flex justify-content-between align-items-center mb-2">
    <h5 class="mb-0">
        <i class="bi bi-code-square"></i> Code Snippets
        <i id="pinToggle" data-tool="snippets" class="bi bi-star pin-star" onclick="togglePin('snippets')"></i>
    </h5>
    <span class="save-status" id="saveStatus"></span>
</div>

<div class="snippets-layout">
    <!-- Left: Snippet List -->
    <div class="snippets-sidebar">
        <div class="snippets-sidebar-header">
            <div class="d-flex gap-1">
                <div class="input-group input-group-sm">
                    <span class="input-group-text"><i class="bi bi-search"></i></span>
                    <input type="search" id="snippetSearch" class="form-control form-control-sm" placeholder="Search snippets...">
                </div>
                <button class="btn btn-sm btn-primary flex-shrink-0" id="newSnippetBtn" title="New snippet (Ctrl+N)">
                    <i class="bi bi-plus-lg"></i>
                </button>
            </div>
        </div>
        <div class="snippets-categories" id="categoriesBar"></div>
        <div class="snippets-list" id="snippetList">
            <div class="snippets-empty">
                <i class="bi bi-code-square"></i>
                <p class="mt-2 mb-0 small">No snippets yet</p>
            </div>
        </div>
    </div>

    <!-- Right: Editor -->
    <div class="snippets-editor" id="editorPanel">
        <div class="snippets-empty" id="editorEmpty">
            <i class="bi bi-code-square"></i>
            <p class="mt-2 mb-1">Select a snippet or create a new one</p>
            <button class="btn btn-sm btn-primary" id="newSnippetBtn2"><i class="bi bi-plus-lg"></i> New Snippet</button>
        </div>
        <div class="d-none" id="editorContent" style="display: flex; flex-direction: column; height: 100%;">
            <!-- Title + Description -->
            <div class="snippets-editor-header">
                <div class="d-flex align-items-center gap-2 mb-1">
                    <input type="text" class="snippets-title-input" id="snippetTitle" placeholder="Snippet title...">
                    <select class="form-select form-select-sm" id="snippetLanguage" style="width: auto; font-size: 0.8rem;"></select>
                    <select class="form-select form-select-sm" id="snippetCategory" style="width: auto; font-size: 0.8rem;">
                        <option value="General">General</option>
                        <option value="Frontend">Frontend</option>
                        <option value="Backend">Backend</option>
                        <option value="Database">Database</option>
                        <option value="DevOps">DevOps</option>
                        <option value="Utility">Utility</option>
                    </select>
                </div>
                <input type="text" class="snippets-desc-input" id="snippetDesc" placeholder="Short description...">
            </div>
            <!-- Tags -->
            <div class="snippets-tags-bar" id="tagsBar">
                <div id="tagsList"></div>
                <input type="text" class="tag-input" id="tagInput" placeholder="+ tag">
            </div>
            <!-- Toolbar -->
            <div class="snippets-toolbar">
                <div class="d-flex gap-1 align-items-center">
                    <button class="btn btn-sm btn-success" id="copyCodeBtn" title="Copy code (Ctrl+Shift+C)">
                        <i class="bi bi-clipboard-code"></i> Copy Code
                    </button>
                    <button class="btn btn-sm btn-outline-secondary" id="pinSnippetBtn" title="Pin snippet">
                        <i class="bi bi-pin"></i>
                    </button>
                    <button class="btn btn-sm btn-outline-secondary" id="duplicateBtn" title="Duplicate snippet">
                        <i class="bi bi-copy"></i>
                    </button>
                    <button class="btn btn-sm btn-outline-danger" id="deleteSnippetBtn" title="Delete snippet">
                        <i class="bi bi-trash"></i>
                    </button>
                </div>
                <div class="d-flex gap-1 align-items-center">
                    <span class="text-muted" style="font-size: 0.7rem;" id="lineInfo"></span>
                </div>
            </div>
            <!-- Monaco Editor -->
            <div class="snippets-body">
                <div id="monacoEditor"></div>
            </div>
        </div>
    </div>
</div>
{{end}}

{{define "scripts"}}
<script src="/static/monaco-editor/min/vs/loader.js"></script>
<script src="/static/snippets.js"></script>
{{end}}
