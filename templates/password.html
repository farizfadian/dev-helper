{{define "content"}}
<style>
    .password-display {
        font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
        font-size: 1.5rem;
        letter-spacing: 1px;
        padding: 1rem 1.5rem;
        border: 2px solid var(--bs-border-color);
        border-radius: 8px;
        background: var(--bs-tertiary-bg);
        text-align: center;
        cursor: pointer;
        transition: border-color 0.15s;
        word-break: break-all;
        min-height: 60px;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
    }
    .password-display:hover {
        border-color: var(--bs-primary);
    }
    .strength-bar {
        height: 6px;
        border-radius: 3px;
        background: var(--bs-tertiary-bg);
        overflow: hidden;
        transition: all 0.3s;
    }
    .strength-bar-fill {
        height: 100%;
        border-radius: 3px;
        transition: width 0.3s, background-color 0.3s;
    }
    .strength-weak { background-color: #dc3545; }
    .strength-fair { background-color: #fd7e14; }
    .strength-strong { background-color: #0dcaf0; }
    .strength-very-strong { background-color: #198754; }
    .strength-label {
        font-size: 0.8rem;
        font-weight: 600;
    }
    .range-value {
        font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
        font-size: 0.9rem;
        font-weight: 700;
        min-width: 36px;
        text-align: center;
    }
    .history-item {
        font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
        font-size: 0.82rem;
        padding: 6px 10px;
        border-bottom: 1px solid var(--bs-border-color);
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
    }
    .history-item:last-child {
        border-bottom: none;
    }
    .history-item:hover {
        background: var(--bs-tertiary-bg);
    }
    .history-item .pw-text {
        flex: 1;
        cursor: pointer;
        word-break: break-all;
    }
    .history-item .pw-meta {
        font-size: 0.7rem;
        color: var(--bs-secondary-color);
        white-space: nowrap;
        font-family: inherit;
    }
    .bulk-output {
        font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
        font-size: 0.85rem;
        min-height: 80px;
        resize: vertical;
        overflow-y: hidden;
    }
    .option-card {
        border: 1px solid var(--bs-border-color);
        border-radius: 8px;
        padding: 1rem;
        background: var(--bs-tertiary-bg);
    }
    .separator-input {
        font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
        width: 60px;
        text-align: center;
    }
</style>

<!-- Toolbar -->
<div class="d-flex justify-content-between align-items-center mb-3">
    <h5 class="mb-0">
        <i class="bi bi-key" style="color: #4caf50;"></i> Password Generator
        <i class="bi bi-star text-muted pin-star" id="pinToggle" data-tool="password" onclick="togglePin('password')" title="Pin to navbar"></i>
    </h5>
</div>

<!-- Password Display -->
<div class="password-display mb-2" id="passwordDisplay" title="Click to copy">
    <span id="passwordText">---</span>
</div>

<!-- Strength Bar -->
<div class="d-flex align-items-center gap-2 mb-3">
    <div class="strength-bar flex-grow-1">
        <div class="strength-bar-fill" id="strengthBar" style="width: 0%;"></div>
    </div>
    <span class="strength-label" id="strengthLabel">—</span>
</div>

<!-- Action Buttons -->
<div class="d-flex justify-content-center gap-2 mb-4 flex-wrap">
    <button class="btn btn-success" id="generateBtn">
        <i class="bi bi-arrow-clockwise"></i> Generate
    </button>
    <button class="btn btn-outline-secondary" id="copyBtn" title="Copy password">
        <i class="bi bi-clipboard"></i> Copy
    </button>
</div>

<!-- Mode Tabs -->
<ul class="nav nav-tabs mb-3" role="tablist">
    <li class="nav-item">
        <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tabPassword" type="button">
            <i class="bi bi-key"></i> Password
        </button>
    </li>
    <li class="nav-item">
        <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tabPassphrase" type="button">
            <i class="bi bi-chat-square-text"></i> Passphrase
        </button>
    </li>
</ul>

<div class="tab-content mb-4">
    <!-- Password Mode -->
    <div class="tab-pane fade show active" id="tabPassword">
        <!-- Length Slider -->
        <div class="mb-3">
            <div class="d-flex justify-content-between align-items-center mb-1">
                <label class="form-label mb-0 fw-semibold small">Password Length</label>
                <span class="range-value" id="lengthValue">16</span>
            </div>
            <input type="range" class="form-range" id="lengthSlider" min="8" max="128" value="16">
            <div class="d-flex justify-content-between">
                <small class="text-muted">8</small>
                <small class="text-muted">128</small>
            </div>
        </div>

        <!-- Character Options -->
        <div class="row g-2 mb-2">
            <div class="col-6 col-md-3">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="optUpper" checked>
                    <label class="form-check-label small" for="optUpper">Uppercase (A-Z)</label>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="optLower" checked>
                    <label class="form-check-label small" for="optLower">Lowercase (a-z)</label>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="optNumbers" checked>
                    <label class="form-check-label small" for="optNumbers">Numbers (0-9)</label>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="optSymbols" checked>
                    <label class="form-check-label small" for="optSymbols">Symbols (!@#$...)</label>
                </div>
            </div>
        </div>
        <div class="mb-0">
            <div class="form-check">
                <input class="form-check-input" type="checkbox" id="optExcludeAmbiguous">
                <label class="form-check-label small" for="optExcludeAmbiguous">Exclude ambiguous characters (0, O, 1, l, I)</label>
            </div>
        </div>
    </div>

    <!-- Passphrase Mode -->
    <div class="tab-pane fade" id="tabPassphrase">
        <div class="row g-3">
            <div class="col-md-4">
                <label class="form-label small fw-semibold">Word Count</label>
                <div class="d-flex align-items-center gap-2">
                    <input type="range" class="form-range flex-grow-1" id="wordCountSlider" min="3" max="10" value="4">
                    <span class="range-value" id="wordCountValue">4</span>
                </div>
            </div>
            <div class="col-md-4">
                <label class="form-label small fw-semibold">Separator</label>
                <select class="form-select form-select-sm" id="separatorSelect">
                    <option value="-" selected>Hyphen (-)</option>
                    <option value=".">Dot (.)</option>
                    <option value="_">Underscore (_)</option>
                    <option value=" ">Space</option>
                    <option value="">None</option>
                    <option value="custom">Custom...</option>
                </select>
            </div>
            <div class="col-md-4 d-none" id="customSepWrap">
                <label class="form-label small fw-semibold">Custom Separator</label>
                <input type="text" class="form-control form-control-sm separator-input" id="customSeparator" value="~" maxlength="3">
            </div>
            <div class="col-md-4">
                <label class="form-label small fw-semibold">Capitalize</label>
                <select class="form-select form-select-sm" id="capitalizeSelect">
                    <option value="title" selected>Title Case</option>
                    <option value="upper">UPPERCASE</option>
                    <option value="lower">lowercase</option>
                    <option value="random">rAnDoM</option>
                </select>
            </div>
        </div>
        <div class="form-check mt-2">
            <input class="form-check-input" type="checkbox" id="optAddNumber" checked>
            <label class="form-check-label small" for="optAddNumber">Append a random number (0-99)</label>
        </div>
    </div>
</div>

<div class="row g-4">
    <!-- Left: Bulk Generate -->
    <div class="col-lg-6">
        <div class="card">
            <div class="card-header py-2 d-flex justify-content-between align-items-center">
                <span class="fw-semibold"><i class="bi bi-list-ol"></i> Bulk Generate</span>
                <div class="d-flex gap-1 align-items-center">
                    <select class="form-select form-select-sm" id="bulkCount" style="width: 70px;">
                        <option value="5">5</option>
                        <option value="10" selected>10</option>
                        <option value="20">20</option>
                        <option value="50">50</option>
                    </select>
                    <button class="btn btn-sm btn-primary" id="bulkGenerateBtn">Generate</button>
                    <button class="btn btn-sm btn-outline-secondary" id="bulkCopyBtn" title="Copy all"><i class="bi bi-clipboard"></i></button>
                </div>
            </div>
            <div class="card-body p-0">
                <textarea id="bulkOutput" class="form-control bulk-output border-0 rounded-0" readonly placeholder="Click Generate to create multiple passwords..."></textarea>
            </div>
        </div>
    </div>

    <!-- Right: History (session only) -->
    <div class="col-lg-6">
        <div class="card">
            <div class="card-header py-2 d-flex justify-content-between align-items-center">
                <span class="fw-semibold"><i class="bi bi-clock-history"></i> History <small class="text-muted">(session only)</small></span>
                <div class="d-flex gap-1">
                    <button class="btn btn-sm btn-outline-secondary" id="copyHistoryBtn" title="Copy all history"><i class="bi bi-clipboard"></i> Copy All</button>
                    <button class="btn btn-sm btn-outline-danger" id="clearHistoryBtn" title="Clear history"><i class="bi bi-trash"></i></button>
                </div>
            </div>
            <div class="card-body p-0" style="max-height: 340px; overflow-y: auto;">
                <div id="historyList">
                    <div class="text-center text-muted py-4 small">No passwords generated yet</div>
                </div>
            </div>
        </div>
    </div>
</div>
{{end}}

{{define "scripts"}}
<script src="/static/password.js"></script>
{{end}}
