{{define "content"}}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <h4 class="mb-3"><i class="bi bi-upload"></i> File Upload <i id="pinToggle" data-tool="upload" class="bi bi-star pin-star" onclick="togglePin('upload')"></i></h4>

        <!-- Drop Zone -->
        <div id="dropZone" class="border border-2 border-dashed rounded-3 p-5 text-center"
             style="border-color: var(--bs-border-color); cursor: pointer; transition: all 0.2s; background: var(--bs-body-bg);">
            <i class="bi bi-cloud-arrow-up" style="font-size: 3rem; color: var(--bs-secondary-color);"></i>
            <p class="mt-2 mb-1 text-muted">Drag & drop file here, click to browse, or <strong>Ctrl+V</strong> to paste</p>
            <small class="text-muted">All file types supported</small>
            <input type="file" id="fileInput" class="d-none">
        </div>

        <!-- Upload Progress -->
        <div id="uploadProgress" class="mt-3 d-none">
            <div class="progress">
                <div class="progress-bar progress-bar-striped progress-bar-animated" style="width: 100%">Uploading...</div>
            </div>
        </div>

        <!-- Result Card -->
        <div id="resultCard" class="card mt-3 d-none">
            <div class="card-body">
                <div class="d-flex align-items-start gap-3">
                    <!-- Preview -->
                    <div id="previewArea"></div>

                    <!-- Info -->
                    <div class="flex-grow-1">
                        <h6 class="card-title">
                            <i class="bi bi-check-circle-fill text-success"></i>
                            <span id="resultFilename"></span>
                        </h6>

                        <!-- File URL -->
                        <label class="form-label mt-2 small text-muted">File URL</label>
                        <div class="input-group mb-2">
                            <input type="text" id="fileUrl" class="form-control form-control-sm" readonly>
                            <button class="btn btn-outline-secondary btn-sm" type="button" onclick="copyField('fileUrl')" title="Copy URL">
                                <i class="bi bi-clipboard"></i>
                            </button>
                        </div>

                        <!-- File Path -->
                        <label class="form-label small text-muted">File Path</label>
                        <div class="input-group mb-2">
                            <input type="text" id="filePath" class="form-control form-control-sm" readonly>
                            <button class="btn btn-outline-secondary btn-sm" type="button" onclick="copyField('filePath')" title="Copy Path">
                                <i class="bi bi-clipboard"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Upload History -->
        <div id="historySection" class="mt-4 d-none">
            <h6 class="text-muted">Recent Uploads</h6>
            <div id="historyList"></div>
        </div>
    </div>
</div>

<!-- Lightbox Modal -->
<div class="modal fade" id="lightboxModal" tabindex="-1">
    <button type="button" class="btn-close btn-close-white position-fixed" data-bs-dismiss="modal"
            style="top: 20px; right: 20px; z-index: 1060; font-size: 1.2rem; opacity: 0.8;"></button>
    <div class="modal-dialog modal-xl modal-dialog-centered">
        <div class="modal-content bg-transparent border-0 shadow-none">
            <div class="modal-body p-0 text-center">
                <img id="lightboxImg" src="" class="img-fluid rounded" style="max-height: 85vh; cursor: pointer;" data-bs-dismiss="modal">
            </div>
        </div>
    </div>
</div>
{{end}}

{{define "scripts"}}
<script src="/static/app.js"></script>
{{end}}
