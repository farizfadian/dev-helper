{{define "content"}}
<style>
    .io-textarea {
        font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
        font-size: 0.85rem;
        min-height: 360px;
        resize: vertical;
    }
    .url-parts table {
        font-size: 0.85rem;
    }
    .url-parts td:first-child {
        font-weight: 600;
        white-space: nowrap;
        width: 100px;
    }
    .url-parts td:last-child {
        word-break: break-all;
        font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    }
</style>

<!-- Toolbar -->
<div class="d-flex justify-content-between align-items-center mb-3">
    <h5 class="mb-0">
        <i class="bi bi-link-45deg"></i> URL Encoder & Decoder
        <i id="pinToggle" data-tool="urlencoder" class="bi bi-star pin-star" onclick="togglePin('urlencoder')"></i>
    </h5>
</div>

<div class="row g-3">
    <!-- Input -->
    <div class="col-md-6">
        <div class="d-flex justify-content-between align-items-center mb-1">
            <label class="form-label mb-0 fw-semibold"><i class="bi bi-input-cursor-text"></i> Input</label>
            <div class="d-flex gap-1">
                <button class="btn btn-sm btn-outline-secondary" id="pasteBtn" title="Paste from clipboard">
                    <i class="bi bi-clipboard-plus"></i> Paste
                </button>
                <button class="btn btn-sm btn-outline-secondary" id="clearInputBtn" title="Clear input">
                    <i class="bi bi-x-lg"></i>
                </button>
            </div>
        </div>
        <textarea id="inputText" class="form-control io-textarea" rows="20" placeholder="Enter URL or text to encode/decode..."></textarea>
    </div>

    <!-- Output -->
    <div class="col-md-6">
        <div class="d-flex justify-content-between align-items-center mb-1">
            <label class="form-label mb-0 fw-semibold"><i class="bi bi-output"></i> Output</label>
            <div class="d-flex gap-1">
                <button class="btn btn-sm btn-outline-secondary" id="copyBtn" title="Copy output">
                    <i class="bi bi-clipboard"></i> Copy
                </button>
            </div>
        </div>
        <textarea id="outputText" class="form-control io-textarea" rows="20" readonly placeholder="Result will appear here..."></textarea>
    </div>
</div>

<!-- Action Buttons -->
<div class="d-flex justify-content-center gap-2 mt-3">
    <button class="btn btn-primary" id="encodeBtn">
        <i class="bi bi-lock"></i> Encode
    </button>
    <button class="btn btn-success" id="decodeBtn">
        <i class="bi bi-unlock"></i> Decode
    </button>
    <button class="btn btn-outline-secondary" id="swapBtn" title="Swap input ↔ output">
        <i class="bi bi-arrow-left-right"></i> Swap
    </button>
    <button class="btn btn-outline-danger" id="clearAllBtn">
        <i class="bi bi-trash"></i> Clear All
    </button>
</div>

<!-- Options -->
<div class="d-flex justify-content-center gap-4 mt-3">
    <div class="form-check form-check-inline">
        <input class="form-check-input" type="radio" name="encodeMode" id="modeComponent" value="component" checked>
        <label class="form-check-label small" for="modeComponent">Component <code class="small">encodeURIComponent</code></label>
    </div>
    <div class="form-check form-check-inline">
        <input class="form-check-input" type="radio" name="encodeMode" id="modeFullURL" value="full">
        <label class="form-check-label small" for="modeFullURL">Full URL <code class="small">encodeURI</code></label>
    </div>
</div>

<!-- URL Parser -->
<div id="urlParserSection" class="mt-4 d-none">
    <h6 class="fw-semibold"><i class="bi bi-diagram-3"></i> URL Parts</h6>
    <div class="url-parts">
        <table class="table table-sm table-bordered mb-0">
            <tbody id="urlPartsBody"></tbody>
        </table>
    </div>
</div>
{{end}}

{{define "scripts"}}
<script src="/static/urlencoder.js"></script>
{{end}}
