{{define "content"}}
<style>
    #editorContainer {
        border: 1px solid var(--bs-border-color);
        border-radius: 4px;
        overflow: hidden;
    }
    .editor-toolbar {
        gap: 0.5rem;
    }
    .editor-toolbar .form-select-sm {
        width: auto;
        min-width: 120px;
    }
    .drop-zone {
        border: 2px dashed var(--bs-border-color);
        border-radius: 8px;
        padding: 1.5rem;
        text-align: center;
        cursor: pointer;
        color: var(--bs-secondary-color);
        transition: all 0.15s ease;
    }
    .drop-zone:hover {
        border-color: #0d6efd;
        color: #0d6efd;
    }
    .status-bar {
        font-size: 0.8rem;
        color: var(--bs-secondary-color);
        padding: 2px 8px;
        background: var(--bs-tertiary-bg);
        border: 1px solid var(--bs-border-color);
        border-top: none;
        border-radius: 0 0 4px 4px;
    }
</style>

<!-- Focus wrapper -->
<div id="focusWrapper" class="focus-wrapper">

<!-- Toolbar -->
<div class="d-flex justify-content-between align-items-center mb-3 focus-toolbar">
    <h5 class="mb-0"><i class="bi bi-code-slash"></i> Code Editor <i id="pinToggle" data-tool="editor" class="bi bi-star pin-star" onclick="togglePin('editor')"></i></h5>
    <div class="d-flex align-items-center editor-toolbar flex-wrap">
        <select id="languageSelect" class="form-select form-select-sm focus-hide">
            <option value="plaintext">Plain Text</option>
            <option value="javascript">JavaScript</option>
            <option value="typescript">TypeScript</option>
            <option value="json">JSON</option>
            <option value="html">HTML</option>
            <option value="css">CSS</option>
            <option value="xml">XML</option>
            <option value="sql">SQL</option>
            <option value="java">Java</option>
            <option value="csharp">C#</option>
            <option value="python">Python</option>
            <option value="go">Go</option>
            <option value="cpp">C++</option>
            <option value="c">C</option>
            <option value="ruby">Ruby</option>
            <option value="php">PHP</option>
            <option value="rust">Rust</option>
            <option value="swift">Swift</option>
            <option value="kotlin">Kotlin</option>
            <option value="dart">Dart</option>
            <option value="shell">Shell</option>
            <option value="powershell">PowerShell</option>
            <option value="yaml">YAML</option>
            <option value="markdown">Markdown</option>
            <option value="dockerfile">Dockerfile</option>
            <option value="ini">INI / TOML</option>
            <option value="bat">Batch</option>
            <option value="lua">Lua</option>
            <option value="perl">Perl</option>
            <option value="r">R</option>
            <option value="scala">Scala</option>
            <option value="graphql">GraphQL</option>
        </select>
        <select id="fontSizeSelect" class="form-select form-select-sm focus-hide" style="min-width: 80px;">
            <option value="12">12px</option>
            <option value="13">13px</option>
            <option value="14" selected>14px</option>
            <option value="16">16px</option>
            <option value="18">18px</option>
            <option value="20">20px</option>
        </select>
        <button class="btn btn-sm btn-outline-secondary focus-hide" id="wrapBtn" title="Toggle Word Wrap">
            <i class="bi bi-text-wrap"></i>
        </button>
        <button class="btn btn-sm btn-outline-secondary focus-hide" id="themeBtn" title="Toggle Dark/Light Theme">
            <i class="bi bi-moon-fill"></i>
        </button>
        <button class="btn btn-sm btn-outline-secondary focus-hide" id="openFileBtn" title="Open File">
            <i class="bi bi-folder2-open"></i>
        </button>
        <button class="btn btn-sm btn-outline-primary focus-hide" id="downloadBtn" title="Download File">
            <i class="bi bi-download"></i> Download
        </button>
        <button class="btn btn-sm btn-outline-primary" id="focusModeBtn" title="Expand (F11)">
            <i class="bi bi-arrows-fullscreen"></i> Expand
        </button>
        <input type="file" id="fileInput" class="d-none">
    </div>
</div>

<!-- Drop Zone -->
<div id="dropZone" class="drop-zone mb-2 focus-hide">
    <i class="bi bi-file-earmark-code" style="font-size: 1.5rem;"></i><br>
    <span>Drag & drop file here, click to browse, or paste content</span>
</div>

<!-- URL Input -->
<div class="input-group input-group-sm mb-2 focus-hide">
    <span class="input-group-text"><i class="bi bi-link-45deg"></i></span>
    <input type="text" id="urlInput" class="form-control" placeholder="Enter URL to fetch file (e.g. http://domain.com/HelloWorld.java)">
    <button class="btn btn-primary" id="fetchUrlBtn">
        <i class="bi bi-cloud-download"></i> Fetch
    </button>
</div>

<!-- Editor Container -->
<div class="focus-grow">
    <div id="editorContainer" class="focus-fill" style="height: calc(100vh - 320px); min-height: 400px;"></div>
</div>

<!-- Status Bar -->
<div class="status-bar d-flex justify-content-between">
    <span id="statusLeft">Ln 1, Col 1</span>
    <span id="statusCenter"></span>
    <span id="statusRight">Plain Text | UTF-8</span>
</div>

</div><!-- /focus-wrapper -->
{{end}}

{{define "scripts"}}
<script src="/static/monaco-editor/min/vs/loader.js"></script>
<script src="/static/editor.js"></script>
{{end}}
