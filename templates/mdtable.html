{{define "content"}}
<style>
    .table-editor { border: 1px solid var(--bs-border-color); border-radius: 0.375rem; overflow: auto; max-height: calc(100vh - 350px); }
    .table-editor table { margin-bottom: 0; border-collapse: collapse; }
    .table-editor th, .table-editor td { padding: 0; border: 1px solid var(--bs-border-color); min-width: 120px; position: relative; }
    .table-editor th { background: var(--bs-tertiary-bg); }
    .cell-input { border: none; outline: none; background: transparent; padding: 0.35rem 0.5rem; width: 100%; font-size: 0.85rem; color: var(--bs-body-color); font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace; }
    .cell-input:focus { outline: 2px solid var(--bs-primary); z-index: 1; position: relative; }
    .col-actions { position: absolute; top: -24px; left: 50%; transform: translateX(-50%); display: none; z-index: 5; }
    .table-editor th:hover .col-actions { display: flex; }
    .row-num { width: 35px; text-align: center; background: var(--bs-tertiary-bg); color: var(--bs-secondary-color); font-size: 0.75rem; cursor: default; min-width: 35px; }
    .output-area { font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace; font-size: 0.82rem; min-height: 150px; resize: vertical; }
    .align-btn { font-size: 0.7rem; padding: 0.05rem 0.25rem; opacity: 0.6; }
    .align-btn:hover, .align-btn.active { opacity: 1; }
</style>

<div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
    <h5 class="mb-0">
        <i class="bi bi-table"></i> Markdown Table Generator
        <i id="pinToggle" data-tool="mdtable" class="bi bi-star pin-star" onclick="togglePin('mdtable')"></i>
    </h5>
    <div class="d-flex gap-1 flex-wrap">
        <button class="btn btn-sm btn-outline-secondary" id="addRowBtn"><i class="bi bi-plus-lg"></i> Row</button>
        <button class="btn btn-sm btn-outline-secondary" id="addColBtn"><i class="bi bi-plus-lg"></i> Col</button>
        <button class="btn btn-sm btn-outline-secondary" id="removeRowBtn"><i class="bi bi-dash-lg"></i> Row</button>
        <button class="btn btn-sm btn-outline-secondary" id="removeColBtn"><i class="bi bi-dash-lg"></i> Col</button>
        <div class="btn-group">
            <button class="btn btn-sm btn-outline-secondary dropdown-toggle" data-bs-toggle="dropdown">
                <i class="bi bi-grid-3x3"></i> Presets
            </button>
            <ul class="dropdown-menu dropdown-menu-end" id="presetsMenu">
                <li><a class="dropdown-item" href="#" data-preset="3x3">3 × 3</a></li>
                <li><a class="dropdown-item" href="#" data-preset="4x5">4 × 5</a></li>
                <li><a class="dropdown-item" href="#" data-preset="5x10">5 × 10</a></li>
                <li><hr class="dropdown-divider"></li>
                <li><a class="dropdown-item" href="#" data-preset="comparison">Comparison Table</a></li>
                <li><a class="dropdown-item" href="#" data-preset="api">API Endpoints</a></li>
                <li><a class="dropdown-item" href="#" data-preset="schedule">Schedule</a></li>
            </ul>
        </div>
        <button class="btn btn-sm btn-outline-secondary" id="importBtn" title="Import from Markdown"><i class="bi bi-file-earmark-arrow-up"></i> Import</button>
        <button class="btn btn-sm btn-outline-danger" id="clearBtn"><i class="bi bi-x-lg"></i></button>
    </div>
</div>

<!-- Table Editor -->
<div class="table-editor mb-3" id="tableEditor">
    <table id="editTable"></table>
</div>

<!-- Output -->
<div class="row g-3">
    <div class="col-md-6">
        <div class="d-flex justify-content-between align-items-center mb-1">
            <label class="form-label mb-0 fw-semibold" style="font-size:0.85rem;"><i class="bi bi-markdown"></i> Markdown Output</label>
            <button class="btn btn-sm btn-outline-secondary py-0 px-1" id="copyMdBtn" title="Copy"><i class="bi bi-clipboard"></i></button>
        </div>
        <textarea class="form-control output-area" id="mdOutput" readonly></textarea>
    </div>
    <div class="col-md-6">
        <div class="d-flex justify-content-between align-items-center mb-1">
            <label class="form-label mb-0 fw-semibold" style="font-size:0.85rem;">
                <i class="bi bi-filetype-html"></i> Output Format
                <select class="form-select form-select-sm d-inline-block ms-1" id="altFormat" style="width:auto; font-size:0.78rem;">
                    <option value="html">HTML</option>
                    <option value="csv">CSV</option>
                    <option value="ascii">ASCII</option>
                </select>
            </label>
            <button class="btn btn-sm btn-outline-secondary py-0 px-1" id="copyAltBtn" title="Copy"><i class="bi bi-clipboard"></i></button>
        </div>
        <textarea class="form-control output-area" id="altOutput" readonly></textarea>
    </div>
</div>
{{end}}

{{define "scripts"}}
<script src="/static/mdtable.js"></script>
{{end}}
