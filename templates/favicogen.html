{{define "content"}}
<style>
    .drop-zone { border: 2px dashed var(--bs-border-color); border-radius: 0.5rem; padding: 2rem; text-align: center; cursor: pointer; transition: all 0.15s; }
    .drop-zone:hover { border-color: var(--bs-primary); background: rgba(13,110,253,0.05); }
    .icon-preview { display: flex; gap: 1rem; flex-wrap: wrap; align-items: flex-end; }
    .icon-item { text-align: center; }
    .icon-item canvas { border: 1px solid var(--bs-border-color); border-radius: 4px; image-rendering: pixelated; }
    .icon-item .label { font-size: 0.72rem; color: var(--bs-secondary-color); margin-top: 0.25rem; }
</style>

<div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
    <h5 class="mb-0">
        <i class="bi bi-app-indicator"></i> Favicon Generator
        <i id="pinToggle" data-tool="favicogen" class="bi bi-star pin-star" onclick="togglePin('favicogen')"></i>
    </h5>
    <div class="d-flex gap-1">
        <button class="btn btn-sm btn-primary d-none" id="downloadZip"><i class="bi bi-download"></i> Download All (ZIP)</button>
        <button class="btn btn-sm btn-outline-secondary d-none" id="downloadIco"><i class="bi bi-download"></i> favicon.ico</button>
    </div>
</div>

<div id="uploadArea">
    <div class="drop-zone" id="dropZone">
        <i class="bi bi-image" style="font-size:3rem; color:var(--bs-secondary-color);"></i>
        <p class="mt-2 mb-1 fw-semibold">Drop image here or click to browse</p>
        <p class="text-muted mb-0" style="font-size:0.85rem;">Recommended: 512×512 or larger square image (PNG, JPG, SVG)</p>
        <input type="file" accept="image/*" class="d-none" id="fileInput">
    </div>
</div>

<div class="d-none" id="resultArea">
    <div class="row g-3 mb-3">
        <div class="col-md-3 text-center">
            <label class="form-label fw-semibold">Source</label>
            <div><img id="sourcePreview" style="max-width:128px; max-height:128px; border-radius:8px; border:1px solid var(--bs-border-color);"></div>
        </div>
        <div class="col-md-9">
            <label class="form-label fw-semibold">Generated Icons</label>
            <div class="icon-preview" id="iconPreview"></div>
        </div>
    </div>

    <div class="card">
        <div class="card-header py-2 fw-semibold" style="font-size:0.82rem;"><i class="bi bi-code-slash"></i> HTML Tags</div>
        <div class="card-body">
            <pre class="mb-0" style="font-size:0.8rem; white-space:pre-wrap;" id="htmlTags"></pre>
            <button class="btn btn-sm btn-outline-secondary mt-2" id="copyHtml"><i class="bi bi-clipboard"></i> Copy HTML</button>
        </div>
    </div>
</div>
{{end}}

{{define "scripts"}}
<script src="/static/favicogen.js"></script>
{{end}}
