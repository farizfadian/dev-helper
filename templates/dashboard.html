{{define "content"}}
<style>
    .hero {
        text-align: center;
        padding: 2rem 0 1.5rem;
    }
    .hero h2 {
        font-weight: 700;
    }
    .hero p {
        color: var(--bs-secondary-color);
    }
    .tool-card {
        border: 1px solid var(--bs-border-color);
        border-radius: 8px;
        padding: 1.25rem;
        background: var(--bs-body-bg);
        height: 100%;
        transition: all 0.15s ease;
        cursor: pointer;
        text-decoration: none;
        color: inherit;
        display: flex;
        flex-direction: column;
    }
    .tool-card:hover {
        border-color: #0d6efd;
        box-shadow: 0 4px 12px rgba(13, 110, 253, 0.15);
        transform: translateY(-2px);
    }
    .tool-card .tool-icon {
        font-size: 1.8rem;
        margin-bottom: 0.5rem;
    }
    .tool-card .tool-name {
        font-weight: 600;
        font-size: 1rem;
        margin-bottom: 0.25rem;
    }
    .tool-card .tool-desc {
        font-size: 0.85rem;
        color: var(--bs-secondary-color);
        flex-grow: 1;
    }
    .tool-card .badge {
        font-size: 0.7rem;
    }
    .search-box {
        max-width: 500px;
        margin: 0 auto;
    }
    .section-title {
        font-weight: 700;
        font-size: 1.2rem;
        margin-bottom: 1rem;
    }
    .no-results {
        text-align: center;
        color: var(--bs-secondary-color);
        padding: 2rem;
    }
</style>

<!-- Hero -->
<div class="hero">
    <h2><i class="bi bi-tools"></i> Dev Helper</h2>
    <p>Offline-first developer toolkit. No logins. No clutter. Just tools.</p>
</div>

<!-- Search -->
<div class="search-box mb-4">
    <div class="input-group">
        <span class="input-group-text"><i class="bi bi-search"></i></span>
        <input type="search" id="searchInput" class="form-control" placeholder="Search tools..." autofocus>
    </div>
</div>

<!-- Pinned / Popular Tools -->
<div id="pinnedSection">
    <div class="section-title"><i class="bi bi-pin-angle-fill"></i> Pinned Tools</div>
    <div id="pinnedGrid" class="row g-3 mb-4"></div>
</div>

<!-- All Tools -->
<div id="allSection">
    <div class="section-title"><i class="bi bi-grid-3x3-gap"></i> All Tools</div>
    <div id="allGrid" class="row g-3"></div>
</div>

<!-- No results -->
<div id="noResults" class="no-results d-none">
    <i class="bi bi-search" style="font-size: 2rem;"></i>
    <p class="mt-2">No tools found</p>
</div>
{{end}}

{{define "scripts"}}
<script src="/static/dashboard.js"></script>
{{end}}
