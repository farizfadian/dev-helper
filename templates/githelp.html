{{define "content"}}
<style>
    .cmd-card { border: 1px solid var(--bs-border-color); border-radius: 0.375rem; padding: 0.6rem; margin-bottom: 0.5rem; cursor: pointer; transition: all 0.1s; }
    .cmd-card:hover { border-color: var(--bs-primary); background: rgba(13,110,253,0.03); }
    .cmd-code { font-family: 'SF Mono', monospace; font-size: 0.85rem; background: var(--bs-tertiary-bg); padding: 0.3rem 0.5rem; border-radius: 0.25rem; display: block; margin-top: 0.3rem; cursor: pointer; }
    .cmd-code:hover { background: var(--bs-secondary-bg); }
    .cmd-desc { font-size: 0.8rem; color: var(--bs-secondary-color); }
    .category-btn { font-size: 0.8rem; }
    .category-btn.active { font-weight: 700; }
</style>

<div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
    <h5 class="mb-0">
        <i class="bi bi-git"></i> Git Cheat Sheet
        <i id="pinToggle" data-tool="githelp" class="bi bi-star pin-star" onclick="togglePin('githelp')"></i>
    </h5>
    <div class="input-group input-group-sm" style="max-width:300px;">
        <span class="input-group-text"><i class="bi bi-search"></i></span>
        <input type="text" class="form-control" id="searchInput" placeholder="Search commands...">
    </div>
</div>

<div class="d-flex gap-1 mb-3 flex-wrap" id="categories"></div>
<div id="commandList"></div>
{{end}}

{{define "scripts"}}
<script src="/static/githelp.js"></script>
{{end}}
