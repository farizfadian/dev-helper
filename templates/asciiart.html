{{define "content"}}
<style>
    .ascii-output { font-family: 'Courier New', monospace; font-size: 10px; line-height: 1.1; white-space: pre; overflow: auto; background: var(--bs-tertiary-bg); border: 1px solid var(--bs-border-color); border-radius: 0.375rem; padding: 1rem; min-height: 200px; max-height: 500px; }
    .font-btn { font-size: 0.78rem; }
    .font-btn.active { font-weight: 700; }
</style>

<div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
    <h5 class="mb-0">
        <i class="bi bi-type-bold"></i> ASCII Art Generator
        <i id="pinToggle" data-tool="asciiart" class="bi bi-star pin-star" onclick="togglePin('asciiart')"></i>
    </h5>
    <div class="d-flex gap-1">
        <button class="btn btn-sm btn-outline-secondary" id="copyBtn"><i class="bi bi-clipboard"></i> Copy</button>
        <button class="btn btn-sm btn-outline-secondary" id="downloadBtn"><i class="bi bi-download"></i> .txt</button>
    </div>
</div>

<div class="row g-3">
    <div class="col-md-4">
        <div class="mb-3">
            <label class="form-label fw-semibold">Text</label>
            <input type="text" class="form-control" id="textInput" placeholder="Hello" value="Hello" maxlength="30">
        </div>
        <div class="mb-3">
            <label class="form-label fw-semibold">Font</label>
            <div class="d-flex gap-1 flex-wrap" id="fontList"></div>
        </div>
        <div class="mb-3">
            <label class="form-label fw-semibold">Character Width</label>
            <select class="form-select form-select-sm" id="charWidth">
                <option value="full">Full</option>
                <option value="fitted">Fitted</option>
            </select>
        </div>
    </div>
    <div class="col-md-8">
        <div class="ascii-output" id="output"></div>
    </div>
</div>
{{end}}

{{define "scripts"}}
<script src="/static/asciiart.js"></script>
{{end}}
