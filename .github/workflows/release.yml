name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Build binaries
        run: |
          VERSION=${GITHUB_REF_NAME}
          LDFLAGS="-s -w -X main.version=${VERSION}"
          mkdir -p dist

          # Windows
          GOOS=windows GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o dist/dev-helper-windows-amd64.exe .

          # Linux
          GOOS=linux GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o dist/dev-helper-linux-amd64 .

          # macOS Intel
          GOOS=darwin GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o dist/dev-helper-darwin-amd64 .

          # macOS Apple Silicon
          GOOS=darwin GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o dist/dev-helper-darwin-arm64 .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
